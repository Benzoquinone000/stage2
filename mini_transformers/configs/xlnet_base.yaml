model:
  model_type: xlnet
  vocab_size: 32000
  hidden_size: 768
  num_hidden_layers: 12
  num_attention_heads: 12
  intermediate_size: 3072
  max_position_embeddings: 512
  dropout: 0.1
  pad_token_id: 0

training:
  batch_size: 8
  learning_rate: 0.00003
  weight_decay: 0.01
  num_epochs: 3
  warmup_steps: 100
